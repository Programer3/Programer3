# ================================================================
# metrics.yml
#
# Uses lowlighter/metrics to generate a beautiful github-metrics.svg
# The SVG is committed to the repo and shown in stats.gtpl
#
# Schedule: every 6 hours
# ================================================================

name: Generate Metrics SVG

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours

  workflow_dispatch:         # manually trigger from the Actions tab

jobs:
  generate:
    name: Build github-metrics.svg
    runs-on: ubuntu-latest

    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Your GitHub username — this is what gets analyzed
          user: Programer3

          # The token needs read:user, repo, and read:packages scopes
          # Add a PAT named METRICS_TOKEN in repo Settings > Secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Output file name (must match what stats.gtpl references)
          filename: github-metrics.svg

          # ---- Plugins ---- (enable/disable any you like) --------

          # Base info: header, activity, community, repositories, metadata
          base: header, activity, community, repositories, metadata

          # Commit calendar / contribution graph
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Most-used languages
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

          # Pinned repos section
          plugin_repositories: yes
          plugin_repositories_featured: Programer3

          # Recent activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          # Stars breakdown
          plugin_stars: yes
          plugin_stars_limit: 4

          # Habits (coding hours, days)
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Aesthetic config
          config_theme: dark
          config_padding: 6%
          config_display: columns

          # Commit the SVG back to the repo automatically
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "bot: refresh github-metrics.svg [skip ci]"
